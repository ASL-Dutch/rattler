# Rattler服务配置文件
# 此配置文件用于控制Rattler服务的各项功能和参数

# 基本服务配置
port: 7003 # 服务监听端口

# 日志配置
log:
  level: debug # 日志级别: debug, info, warn, error
  directory: out/log/ # 日志存储目录

# 临时目录 - 用于存储临时文件
tmp-dir: out/tmp

# 监听任务配置
watchers:
  # XML(Export)监听配置 - 监控报关结果导出文件
  export:
    enabled: true # 是否启用Export监听功能
    nl:
      enabled: true # 是否启用荷兰(NL)导出文件监听
      watch-dir: out/watch/export/nl # 荷兰导出文件监听目录
      backup-dir: out/backup/export/nl # 荷兰导出文件备份目录
    be:
      enabled: true # 是否启用比利时(BE)导出文件监听
      watch-dir: out/watch/export/be # 比利时导出文件监听目录
      backup-dir: out/backup/export/be # 比利时导出文件备份目录

  # PDF(税金单)监听配置 - 监控税金单文件
  pdf:
    enabled: true # 是否启用PDF监听功能
    nl:
      enabled: true # 是否启用荷兰(NL)税金单监听
      keep-original: true # 是否在监听目录保留原始文件
      watch-dir: out/watch/pdf/nl # 荷兰税金单监听目录
      backup-dir: out/backup/pdf/nl # 荷兰税金单备份目录
    be:
      enabled: true # 是否启用比利时(BE)税金单监听
      keep-original: false # 是否在监听目录保留原始文件
      watch-dir: out/watch/pdf/be # 比利时税金单监听目录
      backup-dir: out/backup/pdf/be # 比利时税金单备份目录

# 存储目录配置 - 用于Web服务访问文件
storage:
  nl:
    tax-bill: out/backup/pdf/nl # 荷兰税金单存储目录
    export: out/backup/export/nl # 荷兰导出文件存储目录
  be:
    tax-bill: out/backup/pdf/be # 比利时税金单存储目录
    export: out/backup/export/be # 比利时导出文件存储目录

# 导入XML配置
import:
  xml-dir: out/import-20250428 # 导入XML文件存储目录

# 文件移动队列配置
# 用于异步处理文件移动操作，避免高并发时文件系统操作阻塞主线程
file-mover:
  enabled: true # 是否启用文件移动队列
  queue-size: 500 # 队列缓冲大小，系统繁忙时可缓存等待处理的文件移动任务
  queue-name: global_async_file_mover # 队列名称，用于日志标识
  worker-count: 2 # 并发工作线程数量，建议不超过CPU核心数

# RabbitMQ配置 - 消息队列服务器连接和队列配置
rabbitmq:
  # 连接信息
  url: amqp://guest:guest@127.0.0.1:5672 # RabbitMQ服务器连接地址

  # 连接参数
  heartbeat: 10s # 心跳间隔时间
  connection-timeout: 30s # 连接超时时间

  # 连接池设置
  max-connections: 3 # 最大连接数
  max-channels-per-conn: 10 # 每个连接的最大通道数

  # 自动重连设置
  auto-reconnect: true # 是否自动重连
  reconnect-interval: 5s # 重连间隔时间

  # 消费者设置
  prefetch-count: 1 # 预取消息数量
  auto-ack: false # 是否自动确认消息

  # 导入XML队列配置
  import:
    consumer: asl_import_xml_consumer_dev # 消费者名称
    exchange: softpak.import.topic # 交换机名称
    exchange-type: topic # 交换机类型
    queue: softpak.import # 队列名称

  # 导出XML队列配置
  export:
    exchange: softpak.export.topic # 交换机名称
    exchange-type: topic # 交换机类型
    queue: softpak.export # 队列名称前缀
