name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      # go.sum 未纳入版本管理，在 CI 中生成 go.sum 以通过构建校验
      - name: Resolve dependencies
        run: go mod tidy

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o rattler${{ matrix.suffix }} .
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "rattler-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "rattler${{ matrix.suffix }}"
          else
            tar czf "rattler-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "rattler${{ matrix.suffix }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rattler-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rattler-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
